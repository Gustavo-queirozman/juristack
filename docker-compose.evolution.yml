# Evolution API para WhatsApp do JuriStack.
# Uso na VPS:
#   cp .env.evolution.example .env.evolution
#   edite .env.evolution
#   docker compose --env-file .env.evolution -f docker-compose.evolution.yml up -d

services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: juristack-evolution-api
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    environment:
      SERVER_URL: ${SERVER_URL}
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${POSTGRES_PASSWORD}@evolution-postgres:5432/evolution?schema=public

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_LOCAL_ENABLED: "false"

      CONFIG_SESSION_PHONE_CLIENT: JuriStack
      CONFIG_SESSION_PHONE_NAME: Chrome
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution

  evolution-postgres:
    image: postgres:15-alpine
    container_name: juristack-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: 788a372a77d65d864
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - evolution

  evolution-redis:
    image: redis:7-alpine
    container_name: juristack-evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution

volumes:
  evolution_instances:
  evolution_postgres_data:
  evolution_redis_data:

networks:
  evolution:
    driver: bridge
