name: Deploy Laravel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH }}

            git pull origin main

            composer install --no-dev --optimize-autoloader --no-scripts

            php artisan migrate --force

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            sudo chown -R $USER:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            sudo find storage bootstrap/cache -type f -exec chmod 664 {} \;
            sudo find storage bootstrap/cache -type d -exec chmod 775 {} \;

            PHP_FPM_SERVICE=$(systemctl list-units --type=service --all | grep -o 'php[0-9.]*-fpm.service' | head -n 1)

            if [ -z "$PHP_FPM_SERVICE" ]; then
              echo "Nenhum serviço PHP-FPM encontrado."
              systemctl list-units --type=service --all | grep php || true
              exit 1
            fi

            echo "Reiniciando $PHP_FPM_SERVICE"
            sudo systemctl restart "$PHP_FPM_SERVICE"

            sudo nginx -t
            sudo systemctl reload nginx
